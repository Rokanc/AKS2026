<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000" />
    <title>Portrait AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #000;
        color: #fff;
        -webkit-tap-highlight-color: transparent;
      }

      .hidden {
        display: none !important;
      }

      #ar-shell {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        z-index: 1;
      }

      #ar-scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      /* Keep A-Frame canvas behind our UI */
      .a-canvas {
        z-index: 1 !important;
      }

      #ui-layer {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
      }

      #ui-layer > * {
        pointer-events: auto;
      }

      #boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        background: #0f1117;
        text-align: center;
        pointer-events: auto;
      }

      #boot-overlay p {
        margin: 0;
        max-width: 18rem;
        color: #b4bcc9;
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #5b8def;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #scan-hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: max(1.25rem, env(safe-area-inset-bottom));
        z-index: 55;
        display: flex;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
      }

      #scan-hint p {
        margin: 0.5rem 0 0;
        padding: 0.45rem 0.9rem;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        font-size: 0.85rem;
        backdrop-filter: blur(6px);
      }

      .scan-frame {
        width: min(62vw, 11rem);
        aspect-ratio: 1728 / 2438;
        border: 2px dashed rgba(255, 255, 255, 0.65);
        border-radius: 0.35rem;
      }

      #found-badge {
        position: fixed;
        top: max(0.75rem, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        z-index: 55;
        padding: 0.4rem 0.85rem;
        border-radius: 999px;
        background: rgba(46, 160, 98, 0.92);
        font-size: 0.8rem;
        font-weight: 600;
        pointer-events: none;
      }

      #error-overlay {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        background: rgba(15, 17, 23, 0.95);
        text-align: center;
        pointer-events: auto;
      }

      #error-overlay h2 {
        margin: 0 0 0.5rem;
        font-size: 1.15rem;
      }

      #error-overlay p {
        margin: 0 0 1rem;
        color: #b4bcc9;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .btn {
        min-height: 3rem;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.65rem;
        background: linear-gradient(135deg, #5b8def, #3d6fd8);
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        touch-action: manipulation;
        cursor: pointer;
      }

      #sound-btn {
        position: fixed;
        top: max(0.75rem, env(safe-area-inset-top));
        right: max(0.75rem, env(safe-area-inset-right));
        z-index: 56;
        width: 2.75rem;
        height: 2.75rem;
        padding: 0;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 1.25rem;
        line-height: 1;
        backdrop-filter: blur(6px);
        touch-action: manipulation;
        cursor: pointer;
      }

      #sound-btn.is-muted {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="ar-shell">
      <a-scene
        id="ar-scene"
        embedded
        mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
      >
        <a-assets timeout="120000">
          <video id="video-0" src="Airida.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-1" src="Albertas.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-2" src="Dalius.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-3" src="Dija.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-4" src="Ema.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-5" src="Gabriele.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-6" src="Greta.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-7" src="Kamila.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-8" src="Liana.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-9" src="Lukrecija.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-10" src="Paulius.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-11" src="Rugile.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-12" src="Saule.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-13" src="Ugnius.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-14" src="Urte.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-15" src="Viktorija.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
          <video id="video-16" src="Vilte.mp4" preload="metadata" loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-0" mindar-image-target="targetIndex: 0">
          <a-video src="#video-0" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-1" mindar-image-target="targetIndex: 1">
          <a-video src="#video-1" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-2" mindar-image-target="targetIndex: 2">
          <a-video src="#video-2" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-3" mindar-image-target="targetIndex: 3">
          <a-video src="#video-3" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-4" mindar-image-target="targetIndex: 4">
          <a-video src="#video-4" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-5" mindar-image-target="targetIndex: 5">
          <a-video src="#video-5" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-6" mindar-image-target="targetIndex: 6">
          <a-video src="#video-6" width="1" height="1.412037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-7" mindar-image-target="targetIndex: 7">
          <a-video src="#video-7" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-8" mindar-image-target="targetIndex: 8">
          <a-video src="#video-8" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-9" mindar-image-target="targetIndex: 9">
          <a-video src="#video-9" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-10" mindar-image-target="targetIndex: 10">
          <a-video src="#video-10" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-11" mindar-image-target="targetIndex: 11">
          <a-video src="#video-11" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-12" mindar-image-target="targetIndex: 12">
          <a-video src="#video-12" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-13" mindar-image-target="targetIndex: 13">
          <a-video src="#video-13" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-14" mindar-image-target="targetIndex: 14">
          <a-video src="#video-14" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-15" mindar-image-target="targetIndex: 15">
          <a-video src="#video-15" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="target-16" mindar-image-target="targetIndex: 16">
          <a-video src="#video-16" width="1" height="1.410880787037037" position="0 0 0"></a-video>
        </a-entity>
      </a-scene>
    </div>

    <div id="ui-layer">
      <div id="boot-overlay">
        <div class="spinner" aria-hidden="true"></div>
        <p id="boot-message">Starting camera…</p>
        <button id="tap-start" type="button" class="btn hidden">
          Tap to allow camera
        </button>
      </div>

      <div id="scan-hint" class="hidden">
        <div class="scan-frame" aria-hidden="true"></div>
        <p>Point at the portrait</p>
      </div>

      <div id="found-badge" class="hidden" aria-live="polite"></div>

      <button
        id="sound-btn"
        type="button"
        class="hidden is-muted"
        aria-label="Sound on"
        title="Sound on"
      >
        🔊
      </button>
    </div>

    <div id="error-overlay" class="hidden">
      <div>
        <h2>Camera not available</h2>
        <p>
          Allow camera access in your browser, or try Chrome / Safari on your phone.
        </p>
        <button id="retry-btn" type="button" class="btn">Try again</button>
      </div>
    </div>

    <script>
      (function () {
        /* Must match upload order in MindAR compiler (A→Z if you selected all PNGs sorted by name) */
        const TARGET_NAMES = [
          "Airida",
          "Albertas",
          "Dalius",
          "Dija",
          "Ema",
          "Gabriele",
          "Greta",
          "Kamila",
          "Liana",
          "Lukrecija",
          "Paulius",
          "Rugile",
          "Saule",
          "Ugnius",
          "Urte",
          "Viktorija",
          "Vilte",
        ];

        const sceneEl = document.getElementById("ar-scene");
        const bootOverlay = document.getElementById("boot-overlay");
        const bootMessage = document.getElementById("boot-message");
        const tapStartBtn = document.getElementById("tap-start");
        const scanHint = document.getElementById("scan-hint");
        const foundBadge = document.getElementById("found-badge");
        const errorOverlay = document.getElementById("error-overlay");
        const retryBtn = document.getElementById("retry-btn");
        const soundBtn = document.getElementById("sound-btn");

        const targets = TARGET_NAMES.map((name, i) => ({
          name,
          el: document.getElementById("target-" + i),
          video: document.getElementById("video-" + i),
        }));

        let arStarted = false;
        let sceneReady = false;
        let soundUnlocked = false;
        let targetVisible = false;
        let activeVideo = null;

        function getArSystem() {
          return sceneEl.systems && sceneEl.systems["mindar-image-system"];
        }

        function hideBoot() {
          bootOverlay.classList.add("hidden");
        }

        function showBoot(message, showTapButton) {
          bootOverlay.classList.remove("hidden");
          bootMessage.textContent = message;
          tapStartBtn.classList.toggle("hidden", !showTapButton);
        }

        function showScanning() {
          scanHint.classList.remove("hidden");
          foundBadge.classList.add("hidden");
        }

        function startAR() {
          if (arStarted) return;
          const arSystem = getArSystem();
          if (!arSystem) return;

          arStarted = true;
          errorOverlay.classList.add("hidden");
          showBoot("Starting camera…", false);

          try {
            arSystem.start();
          } catch (err) {
            console.error(err);
            arStarted = false;
            showBoot("Tap to allow camera", true);
          }
        }

        function tryAutoStart() {
          if (!sceneReady || arStarted) return;
          startAR();
        }

        function pauseAllVideos() {
          targets.forEach((t) => t.video.pause());
        }

        function updateSoundButton() {
          const video = activeVideo;
          const muted = !video || video.muted;
          if (muted) {
            soundBtn.textContent = "🔇";
            soundBtn.classList.add("is-muted");
            soundBtn.setAttribute("aria-label", "Turn sound on");
            soundBtn.title = "Turn sound on";
          } else {
            soundBtn.textContent = "🔊";
            soundBtn.classList.remove("is-muted");
            soundBtn.setAttribute("aria-label", "Mute");
            soundBtn.title = "Mute";
          }
        }

        function unlockSound() {
          if (soundUnlocked) return;
          soundUnlocked = true;
          updateSoundButton();
        }

        async function playVideo(video) {
          pauseAllVideos();
          activeVideo = video;
          unlockSound();
          video.volume = 1;
          video.muted = false;
          updateSoundButton();
          try {
            await video.play();
          } catch (e) {
            console.warn("Video play with sound:", e);
            video.muted = true;
            updateSoundButton();
            try {
              await video.play();
            } catch (e2) {
              console.warn("Video play muted:", e2);
            }
          }
        }

        soundBtn.addEventListener("click", async () => {
          unlockSound();
          const video = activeVideo;
          if (!video) return;
          if (video.muted) {
            video.muted = false;
            video.volume = 1;
            updateSoundButton();
            if (targetVisible) {
              try {
                await video.play();
              } catch (e) {
                console.warn("Sound play:", e);
              }
            }
          } else {
            video.muted = true;
            updateSoundButton();
          }
        });

        tapStartBtn.addEventListener("click", () => {
          unlockSound();
          startAR();
        });
        retryBtn.addEventListener("click", () => {
          arStarted = false;
          activeVideo = null;
          pauseAllVideos();
          errorOverlay.classList.add("hidden");
          showBoot("Starting camera…", false);
          tryAutoStart();
        });

        sceneEl.addEventListener("loaded", () => {
          sceneReady = true;
          tryAutoStart();
        });

        sceneEl.addEventListener("arReady", () => {
          hideBoot();
          showScanning();
          soundBtn.classList.remove("hidden");
          updateSoundButton();
        });

        sceneEl.addEventListener("arError", () => {
          arStarted = false;
          hideBoot();
          errorOverlay.classList.remove("hidden");
        });

        targets.forEach(({ name, el, video }) => {
          el.addEventListener("targetFound", () => {
            targetVisible = true;
            foundBadge.textContent = name;
            foundBadge.classList.remove("hidden");
            scanHint.classList.add("hidden");
            playVideo(video);
          });

          el.addEventListener("targetLost", () => {
            if (activeVideo !== video) return;
            targetVisible = false;
            activeVideo = null;
            video.pause();
            foundBadge.classList.add("hidden");
            scanHint.classList.remove("hidden");
          });
        });

        function onFirstInteraction() {
          unlockSound();
          if (!arStarted && sceneReady) {
            startAR();
          }
        }
        document.body.addEventListener("touchstart", onFirstInteraction, {
          once: true,
          passive: true,
        });
        document.body.addEventListener("click", onFirstInteraction, { once: true });

        setTimeout(() => {
          if (!arStarted && sceneReady) {
            showBoot("Tap to allow camera", true);
          }
        }, 2500);
      })();
    </script>
  </body>
</html>
